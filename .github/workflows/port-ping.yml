name: Portfolio Supabase Keep-Alive

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  ping-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Supabase Health Check
        run: |
          # GET /auth/v1/health — endpoint de health check do GoTrue, aceita anon key
          response=$(curl -s -w "%{http_code}" \
                -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_PORTFOLIO }}" \
                "https://jcbrxrncgyexcgenzlfi.supabase.co/auth/v1/health" \
                -o /tmp/response.json)

          echo "Health check response: $response"

          if [[ "$response" =~ ^2[0-9][0-9]$ ]]; then
            echo "Supabase is healthy"
            cat /tmp/response.json
          else
            echo "Supabase health check failed with status code $response"
            cat /tmp/response.json
            exit 1
          fi

      - name: Test contacts table access
        run: |
          # Acessa a tabela contacts via PostgREST — gera atividade real no banco
          response=$(curl -s -w "%{http_code}" \
                  -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_PORTFOLIO }}" \
                  -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_PORTFOLIO }}" \
                  "https://jcbrxrncgyexcgenzlfi.supabase.co/rest/v1/contacts?select=count" \
                  -o /tmp/contacts_response.json)

          echo "Contacts table response: $response"
          cat /tmp/contacts_response.json

          if [[ "$response" == "200" ]]; then
            echo "Contacts table is accessible"
          else
            echo "Contacts table access returned status $response"
          fi
